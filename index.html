<!DOCTYPE html>
<html>
    <head>
        <title>Student Enrollment Form</title>

        <link rel="stylesheet"
              href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
        <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
    </head>

    <body>
        <div class="container">
            <div class="page-header text-center">
                <h2>Student Enrollment Form using JPDB</h2>
            </div>

            <form id="studentForm">

                <div class="form-group">
                    <label>Roll No</label>
                    <input type="text" class="form-control" id="rollNo" onchange="getStudent()">
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="fullName">
                </div>

                <div class="form-group">
                    <label>Class</label>
                    <input type="text" class="form-control" id="studentClass">
                </div>

                <div class="form-group">
                    <label>Birth Date</label>
                    <input type="date" class="form-control" id="birthDate">
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" class="form-control" id="address">
                </div>

                <div class="form-group">
                    <label>Enrollment Date</label>
                    <input type="date" class="form-control" id="enrollDate">
                </div>

                <input type="button" class="btn btn-success" id="saveBtn"
                       value="Save" onclick="saveData()">

                <input type="button" class="btn btn-warning" id="updateBtn"
                       value="Update" onclick="updateData()">

                <input type="button" class="btn btn-danger" id="resetBtn"
                       value="Reset" onclick="resetForm()">

            </form>
        </div>
        <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
        <script src="index.js"></script>
    </body>
</html>
